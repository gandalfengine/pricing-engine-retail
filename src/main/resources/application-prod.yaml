spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      pool-name: pricing-hikari-prod

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

management:
  info:
    env:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.bcnc.challenge.pricing: INFO
